<!DOCTYPE html>
{% load static i18n %}
{% get_current_language as CURRENT_LANGUAGE %}
<html lang="{{ CURRENT_LANGUAGE }}">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <meta name="description" content=""/>
    <meta name="author" content=""/>
    <title>{% trans "Wedding Invitation" %}</title>

    <link rel="icon" type="image/x-icon" href="{% static 'invitations/assets/favicon.ico' %}"/>

    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Great+Vibes&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Pinyon+Script&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="{% static 'invitations/css/styles.css' %}?v=20260401i" rel="stylesheet"/>
</head>
<body class="site-shell">

{% include 'navbar.html' %}

<header class="masthead" style="background-image: url('{% static 'invitations/assets/img/banner.jpg' %}')">
    <div class="container position-relative px-4 px-lg-5">
        <div class="row gx-4 gx-lg-5 justify-content-center">
            <div class="col-12 col-lg-12 col-xl-12">
                <div class="site-heading">
                    <h1 class="site-title" style="font-weight:200;" data-animate="hero-up">BLANKY & DARRY</h1>
                    <span class="subheading wedding-subheading" data-animate="hero-up" data-animate-delay="180">{% trans "are getting married" %}</span>
                </div>
            </div>
        </div>
    </div>
</header>

{% block content %}
{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'invitations/js/scripts.js' %}?v=20260401d"></script>
</body>
</html>
